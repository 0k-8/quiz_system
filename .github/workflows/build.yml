name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'oracle'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Archive Windows App Image
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/QuizSystem -DestinationPath dist/QuizSystem-Windows.zip

      - name: Archive macOS App Image
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r QuizSystem-macOS.zip QuizSystem.app

      - name: Archive Linux App Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          zip -r QuizSystem-Linux.zip QuizSystem

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-image-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.msi
            dist/*.dmg
            dist/*.deb
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image-windows-latest
          path: release-files

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image-macos-latest
          path: release-files

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-image-ubuntu-latest
          path: release-files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/*.zip
          body: |
            ## 🚀 Quiz System Release ${{ github.ref_name }}
            
            ### 📦 Завантажте архів для вашої ОС, розпакуйте та запустіть QuizSystem:
            - **Windows**: `QuizSystem-Windows.zip`
            - **macOS**: `QuizSystem-macOS.zip`
            - **Linux**: `QuizSystem-Linux.zip`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
