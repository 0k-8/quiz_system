name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            jpackage_type: APP_IMAGE
            artifact_ext: zip
          - os: macos-latest
            jpackage_type: DMG
            artifact_ext: dmg
          - os: ubuntu-latest
            jpackage_type: DEB
            artifact_ext: deb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'oracle'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests -Djpackage.type=${{ matrix.jpackage_type }}

      - name: Archive Windows App Image
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/QuizSystem -DestinationPath dist/QuizSystem-Windows.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.dmg
            dist/*.deb
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: installers-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-artifacts/*.zip
            all-artifacts/*.dmg
            all-artifacts/*.deb
          body: |
            ## 🚀 Quiz System Release ${{ github.ref_name }}
            
            ### 📦 Завантажте інсталятор або архів для вашої ОС:
            - **Windows**: `QuizSystem-Windows.zip` (Розпакуйте та запустіть QuizSystem.exe)
            - **macOS**: `QuizSystem-1.0.0.dmg`
            - **Linux**: `quiz-system_1.0.0_amd64.deb`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
